short_bio: >-
  <p>
  Hello! I am Daoze Tang, an incoming Master's student in Computer Science and Technology at <a href="https://www.cau.edu.cn/" target="_blank"><b>China Agricultural University</b></a>, where I will be supervised by <a href="https://faculty.cau.edu.cn/lx_7543/list.htm" target="_blank"><b>Prof. Xiang Li</b></a>.
  </p>
  <p>
  My research spans Computer Science broadly, centering on <b>Computer Vision</b>—and Object Detection in particular—where I build efficient algorithms and robust visual recognition systems.
  </p>
  <p>
  Beyond my own research, I founded and lead a student research group that mentors motivated peers and fields teams for academic competitions.
  </p>
  <p>
  Outside the lab, I draw inspiration from the arts: I play guitar and read widely across literary genres.
  </p>
  <p>
  Of course, I am far from perfect, and I know I cannot please everyone—something I try to take in stride, learning from honest feedback as I go.
  </p>
  <p>
  I am actively seeking academic collaborations, joint doctoral training programs, and Ph.D. opportunities. If my work resonates with you, I would be glad to hear from you.
  </p>

